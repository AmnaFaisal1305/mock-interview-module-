services:
  interview-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: interview-service
    restart: unless-stopped

    env_file:
      - ../.env

    ports:
      - "5000:5000"

    depends_on:
      - redis
      - livekit

    networks:
      - careerpilot

  redis:
    image: redis:7-alpine
    container_name: interview-redis
    restart: unless-stopped

    networks:
      - careerpilot

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit

    command: --config /etc/livekit.yaml

    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

    depends_on:
      - redis

    restart: unless-stopped

    networks:
      - careerpilot

  egress:
    image: livekit/egress:latest
    container_name: livekit-egress

    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml

    volumes:
      - ./egress.yaml:/etc/egress.yaml:ro

    cap_add:
      - SYS_ADMIN

    depends_on:
      - livekit
      - redis

    restart: unless-stopped

    networks:
      - careerpilot

networks:
  careerpilot:
    driver: bridge